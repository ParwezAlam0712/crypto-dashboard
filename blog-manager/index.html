<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Blog List Manager</title>
  <script type="module" src="/src/main.js"></script>
</head>

<body>
  <div class="container">
    <h1>Blog Manager</h1>

    <form id="blog-form">
      <input type="text" id="title" placeholder="Blog title" required />
      <textarea id="body" placeholder="Blog body..." required></textarea>
      <button type="submit">Add Blog</button>
    </form>

    <ul id="blog-list"></ul>
  </div>
</body>

</html>
