<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoDash Pro</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

  <!-- Header -->
  <header class="header">

    <div class="logo">
      🚀 CryptoDash Pro
    </div>

    <div class="header-actions">

      <button id="themeToggle">
        🌙 Dark Mode
      </button>

      <button id="notificationBtn">
        🔔 Notifications
      </button>

    </div>

  </header>

  <!-- Mobile Menu Button -->
  <button class="menu-toggle">
    ☰
  </button>

  <!-- Sidebar -->
  <aside class="sidebar">

    <nav>

      <ul>

        <li><a href="index.html">Dashboard</a></li>

        <li><a href="watchlist.html">Watchlist</a></li>

        <li><a href="portfolio.html">Portfolio</a></li>

        <li><a href="market.html">Markets</a></li>

        <li><a href="news.html">News</a></li>

      </ul>

    </nav>

  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Search Section -->
    <section class="search-section">

      <input type="text" id="search" placeholder="Search Bitcoin, Ethereum...">

    </section>

    <!-- Stats Cards -->
    <section class="stats">

      <div class="card">
        <h3>Market Cap</h3>
        <p id="marketCap">$0</p>
      </div>

      <div class="card">
        <h3>24h Volume</h3>
        <p id="volume">$0</p>
      </div>

      <div class="card">
        <h3>BTC Dominance</h3>
        <p id="btcDominance">0%</p>
      </div>

      <div class="card">
        <h3>Fear & Greed</h3>
        <p id="fearGreed">0</p>
      </div>

    </section>

    <!-- TradingView Chart -->
    <section class="chart-section">

      <h2>Live Chart</h2>

      <div id="tradingview_chart"></div>

    </section>
    <h1>Dashboard</h1>

    <p>
      Dashboard content will come here.
    </p>

  </main>
  <script src="js/menu.js"></script>
  <script src="js/theme.js"></script>
</body>

</html>
